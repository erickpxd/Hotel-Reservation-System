name: hotel-reservation-system

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: ${RESTART_CONTAINER}
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    entrypoint: ["/bin/bash", "/init-mongo.sh"]
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017", "--keyFile", "/etc/mongo/mongodb.key"]
    healthcheck:
      test: test $$(echo "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok || rs.status().ok" | mongosh -u ${MONGO_INITDB_ROOT_USERNAME} -p ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --quiet) -eq 1
      interval: 10s
      start_period: 30s
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/etc/mongo
      - ./init-mongo.sh:/init-mongo.sh

volumes:
  mongodb_data:
  mongodb_config:
